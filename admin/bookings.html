<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Bookings | Seaduced Admin</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <a href="/admin" class="admin-sidebar__logo">
      <span class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5V21M7 16H2M17 16H22M5 16C5 19.866 8.13401 23 12 23C15.866 23 19 19.866 19 16M12 5C13.1046 5 14 4.10457 14 3C14 1.89543 13.1046 1 12 1C10.8954 1 10 1.89543 10 3C10 4.10457 10.8954 5 12 5Z" />
        </svg>
      </span>
      <span class="logo-text">Seaduced Admin</span>
    </a>

    <nav class="admin-nav">
      <a href="/admin" class="admin-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span>Dashboard</span>
      </a>
      <a href="/admin/bookings.html" class="admin-nav__link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span>Bookings</span>
      </a>
      <a href="/admin/stats.html" class="admin-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        <span>Analytics</span>
      </a>
      <a href="/" class="admin-nav__link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>View Site</span>
      </a>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <div class="admin-header__title">
        <h1>Bookings</h1>
        <p>Manage and track all customer reservations across all boats.</p>
      </div>
      <div class="admin-header__actions">
        <button id="refresh-bookings" class="btn btn--outline btn--sm">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          Refresh Data
        </button>
      </div>
    </header>

    <div class="admin-controls">
      <input type="text" id="booking-search" class="admin-search" placeholder="Search by name, email, or tour...">
      <select id="booking-filter-status" class="admin-search" style="flex: 0 0 200px;">
        <option value="all">All Statuses</option>
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
      </select>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table" id="bookings-table">
        <thead>
          <tr>
            <th>Date & Time</th>
            <th>Customer</th>
            <th>Tour</th>
            <th>Passengers</th>
            <th>Boat</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="bookings-tbody">
          <!-- Data will be injected here -->
          <tr>
            <td colspan="6" style="text-align: center; padding: 4rem;">
              <div class="po-spinner" style="margin: 0 auto 1rem;"></div>
              Loading bookings...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful | Seaduced</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/pages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--clr-off-white);
            text-align: center;
        }
        .success-card {
            max-width: 500px;
            width: 100%;
            background: var(--clr-white);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 30, 53, 0.05);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .loading-icon {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(15, 30, 53, 0.1);
            border-top-color: var(--clr-navy);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success-card h1 {
            font-family: var(--ff-serif);
            font-size: 2.2rem;
            color: var(--clr-navy);
            margin-bottom: 1rem;
        }
        .status-message {
            color: var(--clr-text-mid);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn-home {
            display: inline-block;
            background: var(--clr-navy);
            color: var(--clr-white);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(15, 30, 53, 0.15);
        }
    </style>
</head>
<body class="success-page">
    <div class="success-card" id="main-card">
        <div id="status-icon" class="loading-icon"></div>
        <h1 id="status-title">Confirming your booking...</h1>
        <p id="status-text" class="status-message">Please wait while we finalize your payment and reservation details. Do not close this window.</p>
        <div id="action-container" style="display: none;">
            <a href="/" class="btn-home">Return to Homepage</a>
        </div>
    </div>

    <script src="/js/success.js"></script>
</body>
</html>
